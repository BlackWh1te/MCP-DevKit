# BlackWhite — MCP DevKit
pre-commit:
  parallel: true
  commands:
    lint:
      glob: "*.{ts,js}"
      run: npx eslint --fix {staged_files} && git add {staged_files}
    format:
      glob: "*.{ts,js,json,md}"
      run: npx prettier --write {staged_files} && git add {staged_files}
    typecheck:
      run: npx tsc --noEmit
    test:
      run: npx vitest run
